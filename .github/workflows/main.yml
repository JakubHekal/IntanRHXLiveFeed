name: Build and Release Executables

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Enter the version (e.g., v1.0.0)"
        required: true

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Include python-intan as a submodule
        run: git submodule update --init --recursive

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build executable
        run: python pyinstall_run.py

      - name: Rename executable
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            mv dist/rhx_realtime_feed.exe dist/rhx_realtime_feed-windows.exe
          elif [[ "$RUNNER_OS" == "Linux" ]]; then
            mv dist/rhx_realtime_feed dist/rhx_realtime_feed-linux
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            mv dist/rhx_realtime_feed dist/rhx_realtime_feed-macos
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rhx_realtime_feed-${{ matrix.os }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List downloaded files (Debugging)
        run: ls -R

      - name: Make files executable (Linux and macOS)
        run: chmod +x rhx_realtime_feed-* || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          files: rhx_realtime_feed-*
