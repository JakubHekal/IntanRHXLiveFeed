name: Build and Release Executables

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Enter the version (e.g., v1.0.0)"
        required: true
      build-windows:
        description: "Build for Windows"
        type: boolean
        required: false
        default: "true"
      build-linux:
        description: "Build for Linux"
        type: boolean
        required: false
        default: "true"
      build-macos:
        description: "Build for macOS"
        type: boolean
        required: false
        default: "true"

jobs:
  build:
    strategy:
      matrix:
        os: ${{ 
          [
            'windows-latest',
            'ubuntu-latest',
            'macos-latest'
          ] | filter(os => (
            (os == 'windows-latest' && github.event.inputs.build-windows == 'true') ||
            (os == 'ubuntu-latest' && github.event.inputs.build-linux == 'true') ||
            (os == 'macos-latest' && github.event.inputs.build-macos == 'true')
          ))
        }}

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build executable
        run: pyinstaller --onefile --name app main.py

      - name: Rename executable
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            mv dist/app.exe dist/app-windows.exe
          elif [[ "$RUNNER_OS" == "Linux" ]]; then
            mv dist/app dist/app-linux
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            mv dist/app dist/app-macos
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.os }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List downloaded files (Debugging)
        run: ls -R

      - name: Make files executable (Linux and macOS)
        run: chmod +x app-* || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          files: |
            app-windows.exe
            app-linux
            app-macos
