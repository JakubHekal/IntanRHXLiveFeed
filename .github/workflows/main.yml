name: Build and Release Executables

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Enter the version (e.g., v1.0.0)"
        required: true
      build-windows:
        description: "Build for Windows"
        type: boolean
        required: false
        default: true
      build-linux:
        description: "Build for Linux"
        type: boolean
        required: false
        default: true
      build-macos:
        description: "Build for macOS"
        type: boolean
        required: false
        default: true

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        if: ${{ (matrix.os == 'windows-latest' && inputs['build-windows']) || (matrix.os == 'ubuntu-latest' && inputs['build-linux']) || (matrix.os == 'macos-latest' && inputs['build-macos']) }}
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        if: ${{ (matrix.os == 'windows-latest' && inputs['build-windows']) || (matrix.os == 'ubuntu-latest' && inputs['build-linux']) || (matrix.os == 'macos-latest' && inputs['build-macos']) }}
        run: pip install -r requirements.txt

      - name: Build executable
        if: ${{ (matrix.os == 'windows-latest' && inputs['build-windows']) || (matrix.os == 'ubuntu-latest' && inputs['build-linux']) || (matrix.os == 'macos-latest' && inputs['build-macos']) }}
        run: pyinstaller --windowed --no-console --name app main.py

      - name: Rename executable
        if: ${{ (matrix.os == 'windows-latest' && inputs['build-windows']) || (matrix.os == 'ubuntu-latest' && inputs['build-linux']) || (matrix.os == 'macos-latest' && inputs['build-macos']) }}
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            mv dist/app.exe dist/app-windows.exe
          elif [[ "$RUNNER_OS" == "Linux" ]]; then
            mv dist/app dist/app-linux
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            mv dist/app dist/app-macos
          fi
        shell: bash

      - name: Upload artifact
        if: ${{ (matrix.os == 'windows-latest' && inputs['build-windows']) || (matrix.os == 'ubuntu-latest' && inputs['build-linux']) || (matrix.os == 'macos-latest' && inputs['build-macos']) }}
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.os }}
          path: dist/*

  release:
    needs: build
    if: ${{ inputs['build-windows'] || inputs['build-linux'] || inputs['build-macos'] }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List downloaded files (Debugging)
        run: ls -R

      - name: Make files executable (Linux and macOS)
        run: chmod +x app-* || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          files: app-*
